services:
  - type: web
    name: codeforge-backend
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: codeforge-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: PISTON_API_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

databases:
  - name: codeforge-postgres
    databaseName: codeforge
    user: codeforge
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
