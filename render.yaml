services:
  - type: web
    name: codeforge-frontend
    runtime: static
    rootDir: frontend
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://codeforge-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: codeforge-backend
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    branch: main
    autoDeploy: true
    buildCommand: npm run render:build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_MODULES_CACHE
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: codeforge-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://codeforge-frontend.onrender.com
      - key: PISTON_API_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

databases:
  - name: codeforge-postgres
    databaseName: codeforge
    user: codeforge
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
